spring.application.name=zerowaste

 ── Server (Render assigns PORT at runtime) ──
server.port=${PORT:8080}
# ── PostgreSQL ──
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT ──
app.jwt.secret=${JWT_SECRET:7392b2f22e9752f03d0c6e1f2b85a4d1}
app.jwt.expiration-ms=86400000

# ── CORS (Vite dev server) ──
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}


# Local overrides last (set your real password in application-local.properties)
spring.config.import=optional:classpath:application-local.properties
